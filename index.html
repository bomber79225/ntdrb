<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>R幣換算器</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* 移除瀏覽器預設滾輪與箭頭 */
        input::-webkit-outer-spin-button,
        input::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
        input[type=number] {
            -moz-appearance: textfield;
        }
        /* 提升手機點擊感與避免藍色選取框影響視覺 */
        input {
            -webkit-tap-highlight-color: transparent;
            outline: none;
        }
        .no-wrap {
            white-space: nowrap;
        }
    </style>
</head>
<body class="bg-slate-50 min-h-screen flex items-center justify-center p-4">

    <div class="bg-white w-full max-w-md rounded-[2.5rem] shadow-2xl overflow-hidden border border-slate-100">
        <!-- 表頭區域 -->
        <div class="bg-indigo-600 pt-10 pb-8 px-6 text-center text-white">
            <h1 class="text-3xl font-bold tracking-tight">R幣換算器</h1>
            <p class="text-indigo-100 mt-2 text-sm opacity-80 font-medium">點擊數值即可直接覆蓋輸入</p>
        </div>

        <div class="p-6 space-y-6">
            <!-- 匯率設定區 -->
            <div class="bg-slate-50 p-5 rounded-3xl border border-slate-200">
                <div class="flex items-center justify-between mb-3 px-1">
                    <label class="text-xs font-bold text-slate-500 uppercase tracking-widest">匯率比例設定</label>
                    <span class="text-[10px] font-bold text-indigo-500 bg-indigo-50 px-2 py-1 rounded-lg border border-indigo-100">AUTO-SELECT ON</span>
                </div>
                
                <div class="flex items-center bg-white border-2 border-slate-200 rounded-2xl px-4 py-3 focus-within:border-indigo-500 focus-within:ring-4 focus-within:ring-indigo-50 transition-all">
                    <span class="text-slate-400 font-medium no-wrap mr-3">1 台幣 =</span>
                    <input type="number" id="rateInput" value="1" step="any" inputmode="decimal"
                        class="flex-1 text-indigo-600 font-bold text-xl w-full bg-transparent"
                        placeholder="輸入匯率">
                    <span class="text-slate-400 font-bold no-wrap ml-2">R 幣</span>
                </div>
            </div>

            <!-- 轉換輸入區 -->
            <div class="space-y-4 relative">
                <!-- 台幣輸入 -->
                <div class="group">
                    <label class="block text-[11px] font-bold text-slate-400 uppercase tracking-widest mb-1.5 ml-2">台幣 (TWD)</label>
                    <div class="relative">
                        <input type="number" id="twdInput" inputmode="decimal"
                            class="w-full bg-white border-2 border-slate-200 focus:border-indigo-500 focus:ring-4 focus:ring-indigo-50 rounded-2xl px-5 py-4 text-2xl font-semibold transition-all outline-none"
                            placeholder="0">
                        <div class="absolute right-5 top-1/2 -translate-y-1/2 text-slate-300 font-medium pointer-events-none">NT$</div>
                    </div>
                </div>

                <!-- 裝飾用切換圖示 -->
                <div class="flex justify-center -my-3 relative z-10">
                    <div class="bg-white p-2 rounded-full shadow-md border border-slate-100 text-indigo-400">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16V4m0 0L3 8m4-4l4 4m6 0v12m0 0l4-4m-4 4l-4-4" />
                        </svg>
                    </div>
                </div>

                <!-- R 幣輸入 -->
                <div class="group">
                    <label class="block text-[11px] font-bold text-slate-400 uppercase tracking-widest mb-1.5 ml-2">R 幣 (RC)</label>
                    <div class="relative">
                        <input type="number" id="rInput" inputmode="decimal"
                            class="w-full bg-white border-2 border-slate-200 focus:border-indigo-500 focus:ring-4 focus:ring-indigo-50 rounded-2xl px-5 py-4 text-2xl font-semibold transition-all outline-none"
                            placeholder="0">
                        <div class="absolute right-5 top-1/2 -translate-y-1/2 text-slate-300 font-bold pointer-events-none">R</div>
                    </div>
                </div>
            </div>

            <!-- 清除按鈕 -->
            <div class="pt-4 text-center">
                <button id="clearBtn" class="w-full py-4 bg-slate-900 text-white rounded-2xl font-bold hover:bg-black active:scale-[0.97] transition-all shadow-xl mb-4">
                    清空數值
                </button>
                <p id="infoText" class="text-xs font-medium text-slate-400">目前匯率：1 TWD = 1.00 R幣</p>
            </div>
        </div>
    </div>

    <script>
        const rateInput = document.getElementById('rateInput');
        const twdInput = document.getElementById('twdInput');
        const rInput = document.getElementById('rInput');
        const clearBtn = document.getElementById('clearBtn');
        const infoText = document.getElementById('infoText');

        // 計算函數：限制小數點，避免 JS 浮點數誤差
        function calculateVal(val, rate, mode) {
            if (isNaN(val) || isNaN(rate) || rate === 0) return '';
            const result = mode === 'toR' ? val * rate : val / rate;
            return parseFloat(result.toFixed(4));
        }

        // 監聽台幣輸入
        twdInput.addEventListener('input', (e) => {
            const val = parseFloat(e.target.value);
            const rate = parseFloat(rateInput.value);
            if (e.target.value === '') {
                rInput.value = '';
            } else if (!isNaN(val) && !isNaN(rate)) {
                rInput.value = calculateVal(val, rate, 'toR');
            }
        });

        // 監聽 R 幣輸入
        rInput.addEventListener('input', (e) => {
            const val = parseFloat(e.target.value);
            const rate = parseFloat(rateInput.value);
            if (e.target.value === '') {
                twdInput.value = '';
            } else if (!isNaN(val) && !isNaN(rate)) {
                twdInput.value = calculateVal(val, rate, 'toTWD');
            }
        });

        // 監聽匯率變動
        rateInput.addEventListener('input', () => {
            const rate = rateInput.value || '0';
            infoText.textContent = `目前匯率：1 TWD = ${rate} R幣`;
            // 當匯率修改時，通常以目前左側台幣金額為準重新計算右側
            const twdVal = parseFloat(twdInput.value);
            if (!isNaN(twdVal)) {
                rInput.value = calculateVal(twdVal, parseFloat(rate), 'toR');
            }
        });

        // 清空
        clearBtn.addEventListener('click', () => {
            twdInput.value = '';
            rInput.value = '';
            twdInput.focus();
        });

        /**
         * 強大且穩定的自動全選邏輯
         * 針對手機 iOS/Android 與桌面瀏覽器優化
         */
        function setupAutoSelect(inputElement) {
            // 使用 mouseup 與 focus 的組合來確保全選成功
            inputElement.addEventListener('focus', function(e) {
                // 延遲選取以確保在鍵盤彈出後執行
                setTimeout(() => {
                    // 部分手機瀏覽器對 type="number" 的 setSelectionRange 有限制
                    // 先切換為 text 進行選取，再切換回來，或者使用 select()
                    if (this.select) {
                        this.select();
                    }
                    // 強制相容性選取
                    this.setSelectionRange(0, 9999);
                }, 100);
            });

            // 防止第二次點擊取消全選（常見於手機端問題）
            inputElement.addEventListener('mouseup', function(e) {
                e.preventDefault();
            });
        }

        [rateInput, twdInput, rInput].forEach(setupAutoSelect);

    </script>
</body>
</html>
